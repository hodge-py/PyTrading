name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]
    # This is the "Magic" part:
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'all_tickers.txt'
      - 'pages/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            your-username/stock-screener:latest
            your-username/stock-screener:${{ github.run_number }}